<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Startup Tap Game MVP</title>
    <!-- Подключаем скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: Arial, sans-serif;
            background: #1a1a1a;
            color: white;
            text-align: center;
            margin: 0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 90vh;
            overflow: hidden;
            user-select: none;
        }
        #score-container {
            font-size: 28px;
            margin-bottom: 20px;
            font-weight: bold;
        }
        #coin {
            width: 200px;
            height: 200px;
            background: linear-gradient(145deg, #ffcc00, #ff9900);
            border-radius: 50%;
            box-shadow: 0 10px 20px rgba(255, 204, 0, 0.4);
            cursor: pointer;
            transition: transform 0.1s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 50px;
        }
        #coin:active {
            transform: scale(0.95);
        }
    </style>
</head>
<body>

    <div id="user-greeting">Привет, Энтузиаст!</div>
    <div id="score-container">Монеты: <span id="score">0</span></div>
    <div id="coin">🚀</div>

        <script>
        // Инициализация Telegram Web App
        const tg = window.Telegram.WebApp;
        tg.expand(); // Расширяем на весь экран

        // Безопасное получение счета
        let score = 0;
        try {
            const savedScore = localStorage.getItem('tap_score');
            if (savedScore) score = parseInt(savedScore, 10) || 0;
        } catch (e) {
            console.log("LocalStorage недоступен");
        }

        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('coin');
        const greetingEl = document.getElementById('user-greeting');

        // Отображаем имя пользователя из Telegram
        if (tg.initDataUnsafe && tg.initDataUnsafe.user) {
            greetingEl.innerText = `Привет, ${tg.initDataUnsafe.user.first_name}!`;
        }

        scoreEl.innerText = score;

        // Универсальная функция для засчета клика
        function handleTap(event) {
            event.preventDefault(); // Предотвращаем двойной зум на смартфонах
            score++;
            scoreEl.innerText = score;
            
            try {
                localStorage.setItem('tap_score', score);
            } catch (e) {}

            // Вибрация
            if (tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }
        }

        // Слушаем и клики мышкой, и тапы пальцем
        coinEl.addEventListener('click', handleTap);
        coinEl.addEventListener('touchstart', handleTap, { passive: false });
    </script>
