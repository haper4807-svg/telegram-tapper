<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Startup Tap Game MVP</title>
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        #user-greeting { font-size: 20px; color: #aaaaaa; margin-bottom: 10px; }
        #score-container { font-size: 36px; margin-bottom: 40px; font-weight: bold; letter-spacing: 1px; }
        .coin-wrapper { position: relative; }
        #coin {
            width: 220px; height: 220px;
            background: linear-gradient(145deg, #ffcc00, #ff9900);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
            display: flex; align-items: center; justify-content: center;
            font-size: 70px; -webkit-tap-highlight-color: transparent;
        }
        #coin:active { transform: scale(0.92); }
        .floating-text {
            position: absolute; color: #ffcc00; font-size: 28px; font-weight: bold;
            pointer-events: none; animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-100px) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="user-greeting">Синхронизация с сервером...</div>
    <div id="score-container">Монеты: <span id="score">0</span></div>
    
    <div class="coin-wrapper">
        <div id="coin">🚀</div>
    </div>

    <script>
        // === НАСТРОЙКИ БЭКЕНДА SUPABASE ===
        const SUPABASE_URL = "https://ddpquuynoimucakrjdnx.supabase.co/rest/v1/-FMAHedKzKGOg_tRJ_SYJd";
        const SUPABASE_KEY = "sb_publishable_FAovpTZnc-FMAHedKzKGOg_tRJ_SYJd";

        const tg = window.Telegram?.WebApp;
        if (tg) { tg.ready(); tg.expand(); }

        let score = 0;
        let userId = 99999; // ID заглушка для тестов в браузере
        let username = "Энтузиаст";

        if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user) {
            userId = tg.initDataUnsafe.user.id;
            username = tg.initDataUnsafe.user.username || tg.initDataUnsafe.user.first_name;
        }

        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('coin');
        const greetingEl = document.getElementById('user-greeting');

        // Функция загрузки или создания профиля на сервере
        async function loadProfile() {
            try {
                // Пытаемся получить данные пользователя
                let response = await fetch(`${SUPABASE_URL}/rest/v1/users_scores?telegram_id=eq.${userId}`, {
                    headers: { "apikey": SUPABASE_KEY, "Authorization": `Bearer ${SUPABASE_KEY}` }
                });
                let data = await response.json();

                if (data && data.length > 0) {
                    score = data[0].score;
                } else {
                    // Если пользователя нет, создаем его в базе данных
                    await fetch(`${SUPABASE_URL}/rest/v1/users_scores`, {
                        method: "POST",
                        headers: { 
                            "apikey": SUPABASE_KEY, 
                            "Authorization": `Bearer ${SUPABASE_KEY}`,
                            "Content-Type": "application/json",
                            "Prefer": "return=minimal"
                        },
                        body: JSON.stringify({ telegram_id: userId, username: username, score: 0 })
                    });
                    score = 0;
                }
                scoreEl.innerText = score;
                greetingEl.innerText = `Привет, ${username}!`;
            } catch (e) {
                console.error(e);
                greetingEl.innerText = "Ошибка подключения к облаку";
            }
        }

        // Функция сохранения монет (Debounce-оптимизация стартапа: сохраняем при тапе)
        async function saveScoreBackend(currentScore) {
            try {
                await fetch(`${SUPABASE_URL}/rest/v1/users_scores?telegram_id=eq.${userId}`, {
                    method: "PATCH",
                    headers: { 
                        "apikey": SUPABASE_KEY, 
                        "Authorization": `Bearer ${SUPABASE_KEY}`,
                        "Content-Type": "application/json"
                    },
                    body: JSON.stringify({ score: currentScore, updated_at: new Date().toISOString() })
                });
            } catch (e) {
                console.error("Не удалось сохранить на бэкенд", e);
            }
        }

        // Логика тапа
        function doTap(event) {
            if (event) { event.preventDefault(); event.stopPropagation(); }

            score++;
            scoreEl.innerText = score;

            if (tg && tg.HapticFeedback) {
                tg.HapticFeedback.impactOccurred('medium');
            }

            createFloatingText();
            saveScoreBackend(score); // Мгновенный апдейт в облако
        }

        function createFloatingText() {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+1';
            text.style.left = '50%'; text.style.top = '50%';
            coinEl.parentElement.appendChild(text);
            setTimeout(() => text.remove(), 600);
        }

        coinEl.addEventListener('touchstart', doTap, { passive: false });
        coinEl.addEventListener('click', doTap);

        // Запуск синхронизации при старте приложения
        loadProfile();
    </script>
</body>
</html>
