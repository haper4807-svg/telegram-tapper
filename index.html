<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Startup Tap Game MVP</title>
    <!-- Подключаем официальный скрипт Telegram -->
    <script src="https://telegram.org"></script>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #111111;
            color: white;
            text-align: center;
            margin: 0;
            padding: 0;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            overflow: hidden;
            user-select: none;
            -webkit-user-select: none;
            touch-action: manipulation;
        }
        #user-greeting {
            font-size: 20px;
            color: #aaaaaa;
            margin-bottom: 10px;
        }
        #score-container {
            font-size: 36px;
            margin-bottom: 40px;
            font-weight: bold;
            letter-spacing: 1px;
        }
        .coin-wrapper {
            position: relative;
        }
        #coin {
            width: 220px;
            height: 220px;
            background: linear-gradient(145deg, #ffcc00, #ff9900);
            border-radius: 50%;
            box-shadow: 0 15px 30px rgba(255, 204, 0, 0.3);
            cursor: pointer;
            transition: transform 0.05s ease;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 70px;
            -webkit-tap-highlight-color: transparent;
        }
        #coin:active {
            transform: scale(0.92);
        }
        /* Анимация взлетающей надписи +1 */
        .floating-text {
            position: absolute;
            color: #ffcc00;
            font-size: 28px;
            font-weight: bold;
            pointer-events: none;
            animation: floatUp 0.6s ease-out forwards;
        }
        @keyframes floatUp {
            0% { opacity: 1; transform: translate(-50%, -50%) translateY(0) scale(1); }
            100% { opacity: 0; transform: translate(-50%, -50%) translateY(-100px) scale(1.2); }
        }
    </style>
</head>
<body>

    <div id="user-greeting">Загрузка профиля...</div>
    <div id="score-container">Монеты: <span id="score">0</span></div>
    
    <div class="coin-wrapper">
        <div id="coin">🚀</div>
    </div>

    <script>
        // Запускаем безопасную инициализацию Telegram SDK
        let tg = null;
        try {
            if (window.Telegram && window.Telegram.WebApp) {
                tg = window.Telegram.WebApp;
                if (typeof tg.ready === 'function') tg.ready();
                if (typeof tg.expand === 'function') tg.expand();
            }
        } catch(e) {
            console.log("Запуск вне Telegram Mini Apps");
        }

        // Загружаем сохраненные монеты
        let score = 0;
        try {
            const savedScore = localStorage.getItem('startup_score');
            if (savedScore) {
                score = parseInt(savedScore, 10) || 0;
            }
        } catch (e) {
            console.error("Ошибка localStorage:", e);
        }

        const scoreEl = document.getElementById('score');
        const coinEl = document.getElementById('coin');
        const greetingEl = document.getElementById('user-greeting');

        // Выводим баланс на экран
        scoreEl.innerText = score;

        // Определяем имя пользователя (если в Telegram) или пишем заглушку (если в браузере)
        try {
            if (tg && tg.initDataUnsafe && tg.initDataUnsafe.user && tg.initDataUnsafe.user.first_name) {
                greetingEl.innerText = "Привет, " + tg.initDataUnsafe.user.first_name + "!";
            } else {
                greetingEl.innerText = "Привет, Энтузиаст!";
            }
        } catch (e) {
            greetingEl.innerText = "Привет, Энтузиаст!";
        }

        // Логика нажатия
        function doTap(event) {
            if (event) {
                event.preventDefault();
                event.stopPropagation();
            }

            // Начисляем монету
            score++;
            scoreEl.innerText = score;

            // Локально сохраняем прогресс пользователя
            try {
                localStorage.setItem('startup_score', score);
            } catch (e) {}

            // Тактильная отдача (вибрация) на телефонах в Telegram
            try {
                if (tg && tg.HapticFeedback && typeof tg.HapticFeedback.impactOccurred === 'function') {
                    tg.HapticFeedback.impactOccurred('medium');
                }
            } catch(e) {}

            // Создаем визуальный эффект +1
            createFloatingText();
        }

        function createFloatingText() {
            const text = document.createElement('div');
            text.className = 'floating-text';
            text.innerText = '+1';
            
            text.style.left = '50%';
            text.style.top = '50%';
            
            coinEl.parentElement.appendChild(text);
            
            setTimeout(() => {
                text.remove();
            }, 600);
        }

        // Привязываем события для ПК (мышка) и смартфонов (тач)
        coinEl.addEventListener('touchstart', doTap, { passive: false });
        coinEl.addEventListener('click', doTap);
    </script>
</body>
</html>
